# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - Backen

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: npm install, build, and test
        run: |
          npm install
          npm run build --if-present
          npm run test --if-present

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: .

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_983223474846408F9628AD12F5CBF982 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_E8DAA609C38F4568AAB4289E2DF5514C }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_5AF8595E62274291A8BF2FEF3FE71097 }}

      - name: Set Azure App Settings (Environment Variables)
        uses: azure/CLI@v1
        with:
          inlineScript: |
            az webapp config appsettings set \
              --name Backen \
              --resource-group ecommerce-backend-rg \
              --settings \
              MONGO_URI="${{ secrets.MONGO_URI }}" \
              EMAIL_USER="${{ secrets.EMAIL_USER }}" \
              EMAIL_PASS="${{ secrets.EMAIL_PASS }}" \
              SECRET_KEY="${{ secrets.SECRET_KEY }}" \
              CLOUD_NAME="${{ secrets.CLOUD_NAME }}" \
              API_KEY="${{ secrets.API_KEY }}" \
              API_SECRET="${{ secrets.API_SECRET }}"

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'Backen'
          slot-name: 'Production'
          package: .